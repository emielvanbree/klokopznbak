<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLOK OP Z'N BAK</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #FFB800;
    --gold-bright: #FFE840;
    --red: #aa1a08;
    --dark: #0a0603;
    --darker: #060401;
    --mid: #180c04;
  }

  body {
    background: var(--darker);
    color: #fff;
    font-family: 'Oswald', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── GRAIN OVERLAY ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.35;
  }

  /* ── HERO ── */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 40px 20px 60px;
  }

  /* Dark radial bg */
  .hero::after {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 40%, #1e0d04 0%, var(--darker) 70%);
    z-index: 0;
  }

  /* Flying cans bg */
  .cans-bg {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 1;
  }
  .can-fly {
    position: absolute;
    width: 48px;
    opacity: 0;
    animation: flycan 6s linear infinite;
  }
  @keyframes flycan {
    0%   { transform: translateX(-80px) rotate(0deg);   opacity: 0; }
    5%   { opacity: 0.7; }
    95%  { opacity: 0.5; }
    100% { transform: translateX(calc(100vw + 80px)) rotate(720deg); opacity: 0; }
  }

  /* ── TITLE BLOCK ── */
  .title-block {
    position: relative; z-index: 2;
    text-align: center;
    margin-bottom: 12px;
  }

  .title-klok {
    font-family: 'Bangers', cursive;
    font-size: clamp(72px, 18vw, 160px);
    line-height: 0.9;
    letter-spacing: 4px;
    background: linear-gradient(180deg, var(--gold-bright) 0%, var(--gold) 45%, #bb7a00 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 4px 18px rgba(255,140,0,0.5));
    animation: titlepulse 3s ease-in-out infinite;
  }
  @keyframes titlepulse {
    0%, 100% { filter: drop-shadow(0 4px 18px rgba(255,140,0,0.5)); }
    50%       { filter: drop-shadow(0 4px 32px rgba(255,200,0,0.9)); }
  }

  .title-sub {
    font-family: 'Bangers', cursive;
    font-size: clamp(34px, 8vw, 72px);
    letter-spacing: 6px;
    background: linear-gradient(180deg, #fff8e0 0%, #ffd060 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 2px 10px rgba(255,180,0,0.4));
  }

  .tagline {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(11px, 2.5vw, 17px);
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(180, 100, 20, 0.85);
    margin-top: 8px;
  }

  /* ── DICK IMAGE ── */
  .dick-wrap {
    position: relative; z-index: 2;
    display: flex;
    justify-content: center;
    margin: -10px 0 10px;
  }
  .dick-img {
    width: clamp(180px, 45vw, 320px);
    filter: drop-shadow(0 8px 30px rgba(255,100,0,0.35));
    animation: dickbob 2.8s ease-in-out infinite;
  }
  @keyframes dickbob {
    0%, 100% { transform: translateY(0px) rotate(-1deg); }
    50%       { transform: translateY(-10px) rotate(1deg); }
  }

  /* ── BORDER FRAME ── */
  .frame {
    position: absolute;
    inset: 12px;
    border: 2px solid rgba(180, 100, 10, 0.22);
    pointer-events: none;
    z-index: 3;
  }
  .frame::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(180, 100, 10, 0.1);
  }
  /* Corner ornaments */
  .frame::after {
    content: '✦';
    position: absolute;
    top: -12px; left: 50%;
    transform: translateX(-50%);
    color: rgba(200,120,20,0.5);
    font-size: 20px;
  }

  /* ── PLAY BUTTON ── */
  .btn-play {
    position: relative; z-index: 2;
    display: block;
    font-family: 'Bangers', cursive;
    font-size: clamp(22px, 5vw, 38px);
    letter-spacing: 4px;
    color: #fff;
    background: linear-gradient(180deg, #cc2210 0%, var(--red) 50%, #7a0e04 100%);
    border: none;
    border-radius: 10px;
    padding: 16px 48px;
    cursor: pointer;
    text-decoration: none;
    box-shadow: 0 6px 0 #4a0802, 0 12px 30px rgba(180,30,10,0.5);
    transition: transform 0.08s, box-shadow 0.08s;
    margin-bottom: 16px;
  }
  .btn-play:hover {
    transform: translateY(-3px);
    box-shadow: 0 9px 0 #4a0802, 0 18px 40px rgba(220,50,10,0.65);
  }
  .btn-play:active {
    transform: translateY(3px);
    box-shadow: 0 2px 0 #4a0802, 0 6px 20px rgba(180,30,10,0.4);
  }
  .btn-play::before {
    content: '🍺 ';
  }

  /* ── BADGE STRIP ── */
  .badges {
    position: relative; z-index: 2;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 6px;
  }
  .badge {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(200,130,30,0.7);
    border: 1px solid rgba(180,100,10,0.3);
    border-radius: 4px;
    padding: 4px 10px;
  }

  /* ── GROUND LINE ── */
  .ground {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent, rgba(180,100,10,0.4), transparent);
    z-index: 2;
  }

  /* ── SCROLLING TICKER ── */
  .ticker {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--red);
    padding: 6px 0;
    overflow: hidden;
    z-index: 50;
  }
  .ticker-inner {
    display: flex;
    white-space: nowrap;
    animation: ticker 18s linear infinite;
  }
  @keyframes ticker {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .ticker span {
    font-family: 'Bangers', cursive;
    font-size: 15px;
    letter-spacing: 3px;
    color: #fff;
    padding: 0 32px;
    opacity: 0.9;
  }
  .ticker span::before { content: '★ '; color: var(--gold); }

  /* ── SMOKE PARTICLES ── */
  .smoke {
    position: absolute;
    top: 15%; right: 8%;
    z-index: 2;
    pointer-events: none;
  }
  .smoke-puff {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: rgba(200,200,200,0.25);
    position: absolute;
    animation: smokepuff 3s ease-out infinite;
  }
  .smoke-puff:nth-child(2) { animation-delay: 1s; left: 6px; }
  .smoke-puff:nth-child(3) { animation-delay: 2s; left: 3px; }
  @keyframes smokepuff {
    0%   { transform: translateY(0) scale(1);   opacity: 0.4; }
    100% { transform: translateY(-50px) scale(3); opacity: 0; }
  }
</style>
</head>

<script>
  // ── TICKER ───────────────────────────────────────
  const msgs = [
    'NEC NOOIT', 'KLOK OP Z'N BAK', 'ODW ARNHEM', 'BLIKKIE SMIJTEN',
    'LAUWE KLETSERS', 'VITESSE BESTAAT NIET MEER', 'ARNHEM-ZUID REGELT',
    'BIERTJE DOE', 'DE GOFFERT IN VLAMMEN', '026 FOREVER'
  ];
  const t = document.getElementById('ticker');
  const full = [...msgs, ...msgs].map(m => `<span>${m}</span>`).join('');
  t.innerHTML = full + full; // double for seamless loop

  // ── FLYING CANS ──────────────────────────────────
  const bg = document.getElementById('cansBg');
  const canImg = document.getElementById('can-ref');

  function spawnCan() {
    const el = document.createElement('img');
    el.src = canImg.src;
    el.className = 'can-fly';
    el.style.top = (10 + Math.random() * 80) + '%';
    el.style.width = (30 + Math.random() * 30) + 'px';
    el.style.animationDelay = (Math.random() * 6) + 's';
    el.style.animationDuration = (4 + Math.random() * 5) + 's';
    el.style.opacity = 0;
    bg.appendChild(el);
    // Remove after animation
    el.addEventListener('animationiteration', () => {
      el.style.top = (10 + Math.random() * 80) + '%';
    });
  }

  for (let i = 0; i < 8; i++) spawnCan();
</script>
