<canvas id="cv"></canvas>
<script>
'use strict';

// ── CANVAS SETUP ────────────────────────────────────────────────────────────
const cv = document.getElementById('cv');
const cx = cv.getContext('2d');
let W, H;

function resize() {
  W = cv.width  = window.innerWidth;
  H = cv.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); if(state === S.MENU) {} });

// ── IMAGES ──────────────────────────────────────────────────────────────────
const IMG = {};
['blikje','slipje','sjaal','sixpack','geld','nec','dick'].forEach(id => {
  IMG[id] = document.getElementById('img_' + id);
});

// ── STATE ────────────────────────────────────────────────────────────────────
const S = { MENU:0, PLAYING:1, PAUSED:2, GAMEOVER:3 };
let state = S.MENU;

// ── GAME VARS ────────────────────────────────────────────────────────────────
let score = 0;
let hiScore = 0;
let lives = 3;
let combo = 0;
let comboTimer = 0;
let comboMult = 1;
let objects = [];
let slashParticles = [];
let textParticles = [];
let bgParticles = [];
let derbyMode = false;
let derbyTimer = 0;
let derbyMeter = 0; // 0–100
let fogAlpha = 0;   // joint effect
let fogTimer = 0;
let frame = 0;
let spawnTimer = 0;
let spawnRate = 90; // frames between spawns
let missCount = 0;  // objects that fell off without being hit
let screenShake = 0;

const MAX_LIVES = 3;
const DERBY_THRESHOLD = 100;
const DERBY_DURATION = 600; // frames

// ── OBJECT TYPES ─────────────────────────────────────────────────────────────
/*
  type: 'blikje' | 'slipje' | 'sjaal' | 'sixpack' | 'geld' | 'nec' | 'joint'
  blikje  — 1pt, fast, common
  slipje  — 5pt, medium
  sjaal   — 3pt + 15 derby meter
  sixpack — needs 2 hits, 10pt total
  geld    — double score 8s
  nec     — OBSTACLE, costs life
  joint   — 8pt + fog effect
*/
const TYPES = ['blikje','blikje','blikje','slipje','sjaal','sixpack','geld','nec','joint'];
const DERBY_TYPES = ['blikje','sjaal','sjaal','sjaal','nec','nec','slipje'];

// ── SOUND (Web Audio) ────────────────────────────────────────────────────────
const SFX = (() => {
  let ctx = null;
  let muted = false;
  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext||window.webkitAudioContext)();
    if (ctx.state==='suspended') ctx.resume();
    return ctx;
  }
  function env(g, a, d, s, r, t) {
    g.setValueAtTime(0,t); g.linearRampToValueAtTime(1,t+a);
    g.linearRampToValueAtTime(s,t+a+d); g.linearRampToValueAtTime(0,t+a+d+r);
  }
  return {
    toggle() { muted=!muted; return muted; },
    isMuted() { return muted; },
    slash() {
      if(muted) return;
      const c=getCtx(), t=c.currentTime;
      const buf=c.createBuffer(1,c.sampleRate*0.08,c.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length)**1.5;
      const src=c.createBufferSource(); src.buffer=buf;
      const f=c.createBiquadFilter(); f.type='bandpass'; f.frequency.value=1200; f.Q.value=2;
      const g=c.createGain(); g.gain.setValueAtTime(0.3,t); g.gain.linearRampToValueAtTime(0,t+0.08);
      src.connect(f); f.connect(g); g.connect(c.destination);
      src.start(t); src.stop(t+0.1);
    },
    hit(type) {
      if(muted) return;
      const c=getCtx(), t=c.currentTime;
      const freqs={blikje:350,slipje:600,sjaal:280,sixpack:180,geld:880,joint:220,nec:0};
      if(type==='nec') {
        // angry bonk
        const o=c.createOscillator(); o.type='sawtooth';
        o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(60,t+0.3);
        const g=c.createGain(); env(g.gain,0.002,0.05,0.3,0.2,t);
        g.gain.value=0; o.connect(g); g.connect(c.destination);
        o.start(t); o.stop(t+0.55);
      } else {
        const o=c.createOscillator(); o.type=type==='geld'?'square':'triangle';
        o.frequency.setValueAtTime(freqs[type]||400,t);
        o.frequency.exponentialRampToValueAtTime((freqs[type]||400)*0.5,t+0.15);
        const g=c.createGain(); env(g.gain,0.002,0.03,0.15,0.1,t);
        g.gain.value=0; o.connect(g); g.connect(c.destination);
        o.start(t); o.stop(t+0.3);
        // open-can fizz for blikje
        if(type==='blikje'||type==='sixpack') {
          const buf=c.createBuffer(1,c.sampleRate*0.12,c.sampleRate);
          const dd=buf.getChannelData(0);
          for(let i=0;i<dd.length;i++) dd[i]=(Math.random()*2-1)*(1-i/dd.length)**2;
          const s2=c.createBufferSource(); s2.buffer=buf;
          const f2=c.createBiquadFilter(); f2.type='highpass'; f2.frequency.value=3000;
          const g2=c.createGain(); g2.gain.setValueAtTime(0.18,t); g2.gain.linearRampToValueAtTime(0,t+0.12);
          s2.connect(f2); f2.connect(g2); g2.connect(c.destination);
          s2.start(t); s2.stop(t+0.15);
        }
      }
    },
    loseLife() {
      if(muted) return;
      const c=getCtx(), t=c.currentTime;
      [440,415,392,350].forEach((f,i) => {
        const o=c.createOscillator(); o.type='sawtooth'; o.frequency.value=f;
        const g=c.createGain(); env(g.gain,0.01,0.05,0.2,0.2,t+i*0.12);
        g.gain.value=0; o.connect(g); g.connect(c.destination);
        o.start(t+i*0.12); o.stop(t+i*0.12+0.4);
      });
    },
    derby() {
      if(muted) return;
      const c=getCtx(), t=c.currentTime;
      [523,659,784,1047].forEach((f,i) => {
        const o=c.createOscillator(); o.type='square'; o.frequency.value=f;
        const g=c.createGain(); env(g.gain,0.01,0.02,0.3,0.15,t+i*0.1);
        g.gain.value=0; o.connect(g); g.connect(c.destination);
        o.start(t+i*0.1); o.stop(t+i*0.1+0.35);
      });
    },
    combo(n) {
      if(muted) return;
      const c=getCtx(), t=c.currentTime;
      const f=300+n*80;
      const o=c.createOscillator(); o.type='square'; o.frequency.value=f;
      const g=c.createGain(); env(g.gain,0.005,0.02,0.2,0.1,t);
      g.gain.value=0; o.connect(g); g.connect(c.destination);
      o.start(t); o.stop(t+0.25);
    }
  };
})();

// ── OBJECT FACTORY ───────────────────────────────────────────────────────────
function spawnObject() {
  const pool = derbyMode ? DERBY_TYPES : TYPES;
  // Slightly weight NEC during regular play but less so
  let type = pool[Math.floor(Math.random()*pool.length)];
  
  // Don't spawn NEC too early
  if(type === 'nec' && frame < 300) type = 'blikje';

  const x = W * (0.1 + Math.random() * 0.8);
  const vy = -(H * (0.018 + Math.random() * 0.012));
  const vx = (Math.random() - 0.5) * 3;
  const rot = (Math.random() - 0.5) * 0.15;
  
  const obj = {
    type,
    x, y: H + 60,
    vx, vy,
    rot, rotV: (Math.random()-0.5)*0.08,
    angle: Math.random() * Math.PI * 2,
    scale: type==='sixpack' ? 0.9 : type==='sjaal' ? 1.0 : 0.75,
    alive: true,
    hits: 0,          // for sixpack (needs 2)
    maxHits: type==='sixpack' ? 2 : 1,

    splashTimer: 0,
    glowTimer: type==='geld' ? 8 : 0,
  };
  objects.push(obj);

// ── SLASH SYSTEM ─────────────────────────────────────────────────────────────
let slashPoints = [];  // recent pointer positions
let isSlashing = false;

function getPos(e) {
  const r = cv.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: (src.clientX - r.left), y: (src.clientY - r.top) };
}

function onDown(e) {
  e.preventDefault();
  const p = getPos(e);
  
  if(state === S.MENU) { menuClick(p); return; }
  if(state === S.GAMEOVER) { menuClick(p); return; }
  if(state === S.PAUSED) { state = S.PLAYING; return; }
  if(state !== S.PLAYING) return;
  
  // Pause button
  if(p.x > W-70 && p.y < 70) { state = S.PAUSED; return; }
  // Mute button
  if(p.x > W-140 && p.x < W-72 && p.y < 70) { SFX.toggle(); return; }

  isSlashing = true;
  slashPoints = [p];
}

function onMove(e) {
  e.preventDefault();
  if(!isSlashing || state !== S.PLAYING) return;
  const p = getPos(e);
  slashPoints.push(p);
  if(slashPoints.length > 18) slashPoints.shift();
  
  // Check hits
  if(slashPoints.length >= 2) {
    const p1 = slashPoints[slashPoints.length-2];
    const p2 = slashPoints[slashPoints.length-1];
    checkSlash(p1, p2);
  }
  
  // Slash particle trail
  if(Math.random() < 0.6) {
    slashParticles.push({
      x: p.x, y: p.y,
      vx: (Math.random()-0.5)*2,
      vy: (Math.random()-0.5)*2,
      life: 1, decay: 0.08,
      r: 3 + Math.random()*4,
      color: derbyMode ? '#FFD700' : '#ffffff'
    });
  }
}

function onUp(e) {
  e.preventDefault();
  isSlashing = false;
  slashPoints = [];
}

function segIntersectsCircle(ax,ay,bx,by,cx,cy,cr) {
  const dx=bx-ax, dy=by-ay;
  const fx=ax-cx, fy=ay-cy;
  const a=dx*dx+dy*dy;
  const b=2*(fx*dx+fy*dy);
  const c=fx*fx+fy*fy-cr*cr;
  let disc=b*b-4*a*c;
  if(disc<0) return false;
  disc=Math.sqrt(disc);
  const t1=(-b-disc)/(2*a);
  const t2=(-b+disc)/(2*a);
  return (t1>=0&&t1<=1)||(t2>=0&&t2<=1);
}

let doubleScoreTimer = 0;

function checkSlash(p1, p2) {
  for(const obj of objects) {
    if(!obj.alive || obj.slashed) continue;
    const r = 38 * obj.scale;
    if(!segIntersectsCircle(p1.x,p1.y,p2.x,p2.y,obj.x,obj.y,r)) continue;
    
    SFX.slash();
    SFX.hit(obj.type);
    
    if(obj.type === 'nec') {
      // Lose a life!
      lives--;
      obj.slashed = true;
      obj.splashTimer = 12;
      screenShake = 14;
      SFX.loseLife();
      combo = 0; comboMult = 1;
      missCount++;
      spawnTextParticle('AU KLOOTZAK! -1 ❤️', obj.x, obj.y, '#ff2020', 1.4);
      spawnSplash(obj.x, obj.y, '#ff2020');
      if(lives <= 0) {
        setTimeout(() => { state = S.GAMEOVER; if(score > hiScore) hiScore = score; }, 600);
      }
    } else {
      obj.hits++;
      
      if(obj.hits >= obj.maxHits) {
        obj.slashed = true;
        obj.splashTimer = 10;
        
        // Score
        combo++;
        comboTimer = 90;
        comboMult = Math.min(combo >= 5 ? 3 : combo >= 3 ? 2 : 1, 3);
        if(combo >= 2) SFX.combo(combo);
        
        let pts = 0;
        let label = '';
        const mult = doubleScoreTimer > 0 ? 2 : 1;
        
        switch(obj.type) {
          case 'blikje':  pts=1*comboMult*mult; label=pts+'pt'; spawnSplash(obj.x,obj.y,'#c8d030'); break;
          case 'slipje':  pts=5*comboMult*mult; label='👙 '+pts+'pt!'; spawnSplash(obj.x,obj.y,'#cc6010'); break;
          case 'sjaal':
            pts=3*comboMult*mult; label='⚡ '+pts+'pt';
            derbyMeter = Math.min(derbyMeter+15, DERBY_THRESHOLD);
            if(derbyMeter >= DERBY_THRESHOLD && !derbyMode) activateDerby();
            spawnSplash(obj.x,obj.y,'#FFD700');
            break;
          case 'sixpack': pts=10*comboMult*mult; label='🍺🍺 '+pts+'pt!!'; spawnSplash(obj.x,obj.y,'#30cc30'); break;
          case 'geld':
            pts=20*comboMult; doubleScoreTimer=480;
            label='💰 x2 SCORE!'; spawnSplash(obj.x,obj.y,'#FFD700');
            break;
          case 'joint':
            pts=8*comboMult*mult; fogTimer=180; fogAlpha=0;
            label='💨 '+pts+'pt'; spawnSplash(obj.x,obj.y,'#90ff60');
            break;
        }
        
        score += pts;
        spawnTextParticle(label, obj.x, obj.y-30, '#FFD700', 1.2);
        
        if(combo >= 3) spawnTextParticle('COMBO x'+comboMult+'!', obj.x, obj.y-70, '#ff8800', 1.8);
      } else {
        // sixpack first hit
        obj.glowTimer = 8;
        spawnTextParticle('NOG 1!', obj.x, obj.y-30, '#ffaa00', 1.0);
        spawnSplash(obj.x, obj.y, '#40aa40');
      }
    }
  }
}

function activateDerby() {
  derbyMode = true;
  derbyTimer = DERBY_DURATION;
  derbyMeter = 0;
  SFX.derby();
  spawnRate = 45;
  spawnTextParticle('🏆 DERBY MODE!', W/2, H*0.4, '#FFD700', 2.5);
}

// ── DRAW BACKGROUND ──────────────────────────────────────────────────────────
function drawBg() {
  const t = frame/60;
  // Sky
  const g = cx.createLinearGradient(0,0,0,H);
  if(derbyMode) {
    g.addColorStop(0,'#0a0418'); g.addColorStop(0.5,'#200a08'); g.addColorStop(1,'#3a1e08');
  } else {
    g.addColorStop(0,'#0a0818'); g.addColorStop(0.5,'#150d28'); g.addColorStop(1,'#2a1a0a');
  }
  cx.fillStyle=g; cx.fillRect(0,0,W,H);

  // Stars
  bgParticles.forEach(s => {
    s.twinkle += s.speed;
    const a = 0.2+Math.sin(s.twinkle)*0.35;
    cx.fillStyle=`rgba(255,240,200,${a})`;
    cx.beginPath(); cx.arc(s.x*W,s.y*H*0.7,s.r,0,Math.PI*2); cx.fill();
  });

  // Derby glow
  if(derbyMode) {
    const pulse = 0.8+Math.sin(t*3)*0.2;
    const gd = cx.createRadialGradient(W/2,H*0.4,0,W/2,H*0.4,W*0.6);
    gd.addColorStop(0,`rgba(255,200,0,${0.1*pulse})`);
    gd.addColorStop(1,'transparent');
    cx.fillStyle=gd; cx.fillRect(0,0,W,H);
  }

  // Silhouette buildings
  const bldgs=[
    {x:0,   w:0.10,h:0.22},{x:0.12,w:0.07,h:0.18},
    {x:0.20,w:0.11,h:0.28},{x:0.60,w:0.13,h:0.25},
    {x:0.74,w:0.08,h:0.17},{x:0.84,w:0.10,h:0.22},{x:0.92,w:0.08,h:0.15}
  ];
  const baseY=H*0.82;
  bldgs.forEach(b=>{
    cx.fillStyle='#0c0a18';
    cx.fillRect(W*b.x, baseY-H*b.h, W*b.w, H*b.h+2);
  });

  // Ground
  const fg=cx.createLinearGradient(0,H*0.82,0,H);
  fg.addColorStop(0,'#1a1420'); fg.addColorStop(1,'#0d0b14');
  cx.fillStyle=fg; cx.fillRect(0,H*0.82,W,H*0.18);
}

// ── DRAW OBJECT ──────────────────────────────────────────────────────────────
function drawObj(obj) {
  if(!obj.alive) return;
  cx.save();
  cx.translate(obj.x, obj.y);
  cx.rotate(obj.angle);
  const sc = obj.scale * (obj.glowTimer>0 ? 1+obj.glowTimer*0.02 : 1);
  
  // Glow for special items
  if(obj.glowTimer > 0 || obj.type==='geld') {
    const col = obj.type==='geld'?'rgba(255,200,0,0.5)': obj.type==='sjaal'?'rgba(255,200,0,0.4)':'rgba(100,255,100,0.4)';
    cx.shadowColor=col; cx.shadowBlur=20+Math.sin(frame*0.2)*8;
  }
  if(derbyMode && obj.type==='sjaal') { cx.shadowColor='#FFD700'; cx.shadowBlur=30; }
  
  const imgMap = {blikje:'blikje',slipje:'slipje',sjaal:'sjaal',sixpack:'sixpack',geld:'geld',nec:'nec',joint:null};
  const imgKey = imgMap[obj.type];
  const sz = 80 * sc;
  
  if(imgKey && IMG[imgKey] && IMG[imgKey].complete) {
    cx.drawImage(IMG[imgKey], -sz/2, -sz/2, sz, sz);
  } else if(obj.type === 'joint') {
    // Draw joint procedurally
    cx.save();
    cx.rotate(-0.3);
    // body
    cx.fillStyle='#f5e8c0';
    cx.beginPath(); cx.roundRect(-6,-28,12,52,4); cx.fill();
    // filter tip
    cx.fillStyle='#e8c090';
    cx.fillRect(-6,20,12,10);
    // twist top
    cx.fillStyle='#c8d860';
    cx.beginPath(); cx.ellipse(0,-30,7,5,0,0,Math.PI*2); cx.fill();
    // smoke
    const smokeA = Math.sin(frame*0.08)*0.4+0.3;
    cx.fillStyle=`rgba(220,220,220,${smokeA})`;
    cx.beginPath(); cx.arc(-2,-38,4,0,Math.PI*2); cx.fill();
    cx.beginPath(); cx.arc(1,-46,3,0,Math.PI*2); cx.fill();
    cx.restore();
  }
  
  cx.shadowBlur=0;
  cx.restore();
}

// ── DRAW SLASH TRAIL ─────────────────────────────────────────────────────────
function drawSlash() {
  if(slashPoints.length < 2) return;
  cx.save();
  cx.lineCap='round'; cx.lineJoin='round';
  for(let i=1;i<slashPoints.length;i++) {
    const a = i/slashPoints.length;
    cx.globalAlpha = a*0.85;
    cx.strokeStyle = derbyMode ? `rgba(255,200,0,${a})` : `rgba(255,255,255,${a})`;
    cx.lineWidth = 2+a*6;
    cx.shadowColor = derbyMode ? '#FFD700' : '#ffffff';
    cx.shadowBlur = 8;
    cx.beginPath();
    cx.moveTo(slashPoints[i-1].x, slashPoints[i-1].y);
    cx.lineTo(slashPoints[i].x, slashPoints[i].y);
    cx.stroke();
  }
  cx.globalAlpha=1; cx.shadowBlur=0;
  cx.restore();
}

  cx.fillStyle='#ff5040'; cx.textBaseline='middle';

    cx.textAlign='center'; cx.textBaseline='top';
    cx.shadowColor='rgba(0,0,0,0.9)'; cx.shadowBlur=6;

    cx.shadowBlur=0;

  const meterW = Math.min(W*0.55, 220);
  const meterH = 14;

  const meterY = derbyMode ? 35 : 32;
  if(!derbyMode) {
    cx.fillStyle='rgba(0,0,0,0.5)';
    roundRect(cx, meterX, meterY, meterW, meterH, 6); cx.fill();
    const fill = (derbyMeter/DERBY_THRESHOLD)*meterW;
    const mg = cx.createLinearGradient(meterX,0,meterX+meterW,0);
    mg.addColorStop(0,'#886600'); mg.addColorStop(1,'#FFD700');
    cx.fillStyle=mg;
    if(fill > 0) { roundRect(cx,meterX,meterY,fill,meterH,6); cx.fill(); }
    cx.strokeStyle='rgba(255,200,0,0.4)'; cx.lineWidth=1;
    roundRect(cx,meterX,meterY,meterW,meterH,6); cx.stroke();
    cx.font=`${Math.min(fs*0.62,11)}px Bangers,sans-serif`;
    cx.fillStyle='rgba(255,220,100,0.8)'; cx.textAlign='center'; cx.textBaseline='middle';
    cx.fillText('⚡ DERBY METER', W/2, meterY+meterH/2);
  } else {
    // Derby countdown bar
    const dFill = (derbyTimer/DERBY_DURATION)*meterW;
    cx.fillStyle='rgba(0,0,0,0.5)';
    roundRect(cx,meterX,meterY,meterW,meterH,6); cx.fill();
    const dg = cx.createLinearGradient(meterX,0,meterX+meterW,0);
    dg.addColorStop(0,'#cc4400'); dg.addColorStop(1,'#FFD700');
    cx.fillStyle=dg;
    if(dFill>0) { roundRect(cx,meterX,meterY,dFill,meterH,6); cx.fill(); }
    cx.strokeStyle='rgba(255,200,0,0.4)'; cx.lineWidth=1;
    roundRect(cx,meterX,meterY,meterW,meterH,6); cx.stroke();
    cx.font=`${Math.min(fs*0.62,11)}px Bangers,sans-serif`;
    cx.fillStyle='#FFD700'; cx.textAlign='center'; cx.textBaseline='middle';
    const pulse = Math.abs(Math.sin(frame*0.12));
    cx.globalAlpha=0.7+pulse*0.3;
    cx.fillText('🏆 DERBY MODE ACTIEF!', W/2, meterY+meterH/2);
    cx.globalAlpha=1;
  }

  // Double score indicator
  if(doubleScoreTimer > 0) {
    cx.font=`${Math.min(fs*0.9,16)}px Bangers,sans-serif`;
    cx.fillStyle='#FFD700'; cx.textAlign='center'; cx.textBaseline='top';

  roundRect(cx, W-btnSz*2-10, 4, btnSz, btnSz, 7); cx.fill();
  cx.font=`${btnSz*0.5}px sans-serif`;
  cx.fillText(SFX.isMuted()?'🔇':'🔊', W-btnSz*1.5-10, 4+btnSz/2);

  cx.restore();

  // Start button
  const bw=Math.min(W*0.75,300), bh=Math.max(H*0.08,46);
  drawBtn(cx,'🍺 START DE BENDE', W/2, H*0.78, bw, bh, '#9a1c08');

  cx.font=`${Math.min(H*0.02,12)}px Bangers,sans-serif`;
  cx.fillStyle='rgba(80,40,10,0.7)';
  cx.textBaseline='bottom';
  cx.fillText('NEC aan laars! — Made in Arnhem-Zuid',W/2,H*0.98);
  cx.restore();
}

// ── DRAW GAMEOVER ────────────────────────────────────────────────────────────
function drawGameOver() {
  cx.fillStyle='rgba(20,0,0,0.85)'; cx.fillRect(0,0,W,H);
  cx.save(); cx.textAlign='center';

  cx.font=`${Math.min(H*0.09,W*0.15)}px Bangers,sans-serif`;
  cx.fillStyle='#ff2020'; cx.shadowColor='#880000'; cx.shadowBlur=30;
  cx.textBaseline='top';
  cx.fillText('SLAPPE WASBAK!', W/2, H*0.15);

  cx.shadowBlur=0;
  cx.font=`${Math.min(H*0.06,W*0.1)}px Bangers,sans-serif`;
  cx.fillStyle='#FFD700';
  cx.fillText(`SCORE: ${score}`, W/2, H*0.32);
  
  if(score >= hiScore && score > 0) {
    cx.font=`${Math.min(H*0.04,W*0.07)}px Bangers,sans-serif`;
    cx.fillStyle='#FFE840';
    cx.fillText('🏆 NIEUW RECORD!', W/2, H*0.42);
  }

  cx.font=`${Math.min(H*0.03,14)}px Bangers,sans-serif`;
  cx.fillStyle='rgba(200,120,120,0.8)';
  cx.textBaseline='top';
  cx.fillText("de blikjes zijn gevallen...", W/2, H*0.52);

  if(IMG.dick.complete) {
    const dsz=Math.min(W*0.15,70);
    cx.drawImage(IMG.dick, W/2-dsz/2, H*0.56, dsz, dsz);
  }

  const bw=Math.min(W*0.82,320), bh=Math.max(H*0.08,46), gap=H*0.015;
  drawBtn(cx,'🔄 HERRAMMEN', W/2, H*0.75, bw, bh, '#aa1a08');
  cx.restore();
}

// ── DRAW PAUSE ───────────────────────────────────────────────────────────────
function drawPause() {
  cx.fillStyle='rgba(0,0,0,0.75)'; cx.fillRect(0,0,W,H);
  cx.save(); cx.textAlign='center'; cx.textBaseline='middle';
  cx.font=`${Math.min(H*0.09,W*0.16)}px Bangers,sans-serif`;
  cx.fillStyle='#FFD700'; cx.shadowColor='#6a4000'; cx.shadowBlur=20;
  cx.fillText('PAUZE 🚬', W/2, H*0.35);
  cx.shadowBlur=0;
  cx.font=`${Math.min(H*0.03,14)}px Bangers,sans-serif`;
  cx.fillStyle='rgba(180,140,80,0.7)';
  cx.fillText('Tik om door te gaan', W/2, H*0.47);
  cx.restore();
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function roundRect(c2,x,y,w,h,r) {
  c2.beginPath();
  c2.moveTo(x+r,y); c2.lineTo(x+w-r,y);
  c2.arc(x+w-r,y+r,r,-Math.PI/2,0);
  c2.lineTo(x+w,y+h-r);
  c2.arc(x+w-r,y+h-r,r,0,Math.PI/2);
  c2.lineTo(x+r,y+h);
  c2.arc(x+r,y+h-r,r,Math.PI/2,Math.PI);
  c2.lineTo(x,y+r);
  c2.arc(x+r,y+r,r,Math.PI,-Math.PI/2);
  c2.closePath();
}

function drawBtn(c2,text,cx2,cy2,bw,bh,col) {
  const x=cx2-bw/2,y=cy2-bh/2;
  c2.fillStyle='rgba(0,0,0,0.55)';
  roundRect(c2,x+3,y+3,bw,bh,8); c2.fill();
  c2.fillStyle=col;
  roundRect(c2,x,y,bw,bh,8); c2.fill();
  c2.save(); c2.beginPath(); roundRect(c2,x,y,bw,bh/2,8); c2.clip();
  c2.fillStyle='rgba(255,255,255,0.1)'; c2.fillRect(x,y,bw,bh/2);
  c2.restore();
  c2.strokeStyle='rgba(255,255,255,0.25)'; c2.lineWidth=1.5;
  roundRect(c2,x,y,bw,bh,8); c2.stroke();
  c2.font=`${bh*0.48}px Bangers,sans-serif`;
  c2.fillStyle='#fff'; c2.textAlign='center'; c2.textBaseline='middle';
  c2.shadowColor='rgba(0,0,0,0.9)'; c2.shadowBlur=5;
  c2.fillText(text,cx2,cy2);
  c2.shadowBlur=0;
}

function menuClick(p) {
  const bw=Math.min(W*0.82,320), bh=Math.max(H*0.08,46);
  if(state===S.MENU) {
    if(p.x>W/2-bw/2 && p.x<W/2+bw/2 && p.y>H*0.78-bh/2 && p.y<H*0.78+bh/2) {
      startGame();
    }
  } else if(state===S.GAMEOVER) {
    if(p.x>W/2-bw/2 && p.x<W/2+bw/2 && p.y>H*0.75-bh/2 && p.y<H*0.75+bh/2) {
      startGame();
    }
  }
}

function startGame() {
  score=0; lives=MAX_LIVES; combo=0; comboMult=1; comboTimer=0;
  objects=[]; slashParticles=[]; textParticles=[];
  derbyMode=false; derbyTimer=0; derbyMeter=0;
  fogTimer=0; fogAlpha=0; doubleScoreTimer=0;
  screenShake=0; missCount=0;
  spawnTimer=0; spawnRate=90; frame=0;
  state=S.PLAYING;
}

// ── UPDATE ────────────────────────────────────────────────────────────────────
function update() {
  if(state !== S.PLAYING) return;
  frame++;

  // Increase difficulty over time
  if(frame % 600 === 0 && spawnRate > 35) spawnRate = Math.max(35, spawnRate-5);

  // Timers
  if(comboTimer > 0) { comboTimer--; if(comboTimer===0) { combo=0; comboMult=1; } }
  if(doubleScoreTimer > 0) doubleScoreTimer--;
  if(fogTimer > 0) {
    fogTimer--;
    fogAlpha = fogTimer > 140 ? Math.min(fogAlpha+0.015, 0.22) : fogAlpha*0.97;
  } else fogAlpha = 0;

  if(derbyMode) {
    derbyTimer--;
    if(derbyTimer <= 0) {
      derbyMode=false; spawnRate=Math.max(45, spawnRate);
      spawnTextParticle('DERBY VOORBIJ', W/2, H*0.4, '#ff8800', 1.8);
    }
  }

  // Spawn
  spawnTimer++;
  if(spawnTimer >= spawnRate) {
    spawnTimer=0;
    spawnObject();
    if(derbyMode || Math.random()<0.3) spawnObject(); // extra during derby
  }

  // Update objects
  const GRAVITY = 0.22;
  objects.forEach(obj => {
    if(!obj.alive) return;
    obj.vy += GRAVITY;
    obj.x += obj.vx;
    obj.y += obj.vy;
    obj.angle += obj.rotV;
    if(obj.glowTimer > 0) obj.glowTimer--;
    if(obj.splashTimer > 0) obj.splashTimer--;
    if(obj.splashTimer === 0 && obj.slashed) obj.alive = false;

    // Fell off bottom without being hit
    if(!obj.slashed && obj.y > H+80) {
      obj.alive = false;
      if(obj.type === 'nec') return; // don't punish for missing NEC
      missCount++;
      if(missCount % 4 === 0) { // every 4 missed objects costs a life
        lives--;
        SFX.loseLife();
        spawnTextParticle('GEMIST! -❤️', obj.x, H*0.7, '#ff5040', 1.2);
        screenShake=8;
        if(lives<=0) setTimeout(()=>{ state=S.GAMEOVER; if(score>hiScore) hiScore=score; },400);
      }
    }
  });
  objects = objects.filter(o=>o.alive || o.splashTimer>0);

  // Particles
  slashParticles = slashParticles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life-=p.decay; return p.life>0;
  });
  textParticles = textParticles.filter(p=>{
    p.y+=p.vy; p.life-=p.decay; return p.life>0;
  });

  if(screenShake > 0) screenShake--;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  cx.clearRect(0,0,W,H);

  if(state === S.MENU) { drawMenu(); return; }
  if(state === S.GAMEOVER) { drawBg(); drawGameOver(); return; }

  // Screen shake
  cx.save();
  if(screenShake > 0) {
    cx.translate((Math.random()-0.5)*screenShake*2,(Math.random()-0.5)*screenShake*1.5);
  }

  drawBg();

  // Draw objects
  objects.forEach(drawObj);

  // Slash particles
  slashParticles.forEach(p=>{
    cx.globalAlpha=p.life;
    cx.fillStyle=p.color;
    cx.beginPath(); cx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); cx.fill();
  });
  cx.globalAlpha=1;

  // Text particles
  textParticles.forEach(p=>{
    cx.globalAlpha=p.life;
    const fs2 = Math.min(22,16)*p.scale;
    cx.font=`${fs2}px Bangers,sans-serif`;
    cx.fillStyle=p.color; cx.textAlign='center'; cx.textBaseline='middle';
    cx.strokeStyle='rgba(0,0,0,0.9)'; cx.lineWidth=3;
    cx.strokeText(p.text,p.x,p.y);
    cx.fillText(p.text,p.x,p.y);
  });
  cx.globalAlpha=1;

  drawSlash();
  drawHUD();

  // Joint fog effect
  if(fogAlpha > 0) {
    cx.fillStyle=`rgba(100,180,60,${fogAlpha})`;
    cx.fillRect(0,0,W,H);
  }

  if(state === S.PAUSED) drawPause();
  cx.restore();
}

// ── LOOP ──────────────────────────────────────────────────────────────────────
function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

// ── INPUT ─────────────────────────────────────────────────────────────────────
cv.addEventListener('touchstart', onDown, {passive:false});
cv.addEventListener('touchmove',  onMove, {passive:false});
cv.addEventListener('touchend',   onUp,   {passive:false});
cv.addEventListener('mousedown',  onDown);
cv.addEventListener('mousemove',  onMove);
cv.addEventListener('mouseup',    onUp);

requestAnimationFrame(loop);
</script>
