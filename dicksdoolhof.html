<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0b14">
<title>Dick's Doolhof</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  background:#0d0b14;
  overflow:hidden;
  font-family:'Arial Black', Arial, sans-serif;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  touch-action: none;
}
#gameCanvas { display:block; touch-action: none; -webkit-tap-highlight-color: transparent; }
#wrapper {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:#0d0b14;
}
.overlay {
  position:fixed; inset:0;
  background:rgba(8,6,18,0.95);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  text-align:center; padding:24px; z-index:100;
}
.overlay-title {
  font-size:clamp(28px,9vw,56px); color:#ffd700; font-weight:900;
  line-height:1.1; text-shadow:0 0 20px rgba(255,200,0,0.6),3px 3px 0 #7a4000;
  margin-bottom:10px;
}
.overlay-sub { font-size:clamp(12px,3.5vw,17px); color:rgba(255,255,255,0.55); margin-bottom:28px; font-weight:normal; font-family:Arial,sans-serif; }
.overlay-score { font-size:clamp(16px,5vw,26px); color:#44ee66; margin-bottom:20px; font-weight:900; }
.start-btn {
  background:linear-gradient(135deg,#9a1c08,#6a0e04);
  border:2px solid rgba(255,100,50,0.5); border-radius:14px; color:#fff;
  font-family:'Arial Black',Arial,sans-serif; font-size:clamp(15px,4.5vw,20px);
  font-weight:900; padding:clamp(12px,3vw,18px) clamp(24px,7vw,40px); cursor:pointer;
  box-shadow:0 4px 20px rgba(180,30,10,0.5); letter-spacing:0.05em;
  margin-top:8px; -webkit-tap-highlight-color:transparent; touch-action:manipulation;
}
.start-btn:active { transform:scale(0.96); }
.legend { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:20px; max-width:360px; }
.legend-item { display:flex; align-items:center; gap:5px; font-size:clamp(9px,2.5vw,12px); color:rgba(255,255,255,0.65); font-family:Arial,sans-serif; }
.legend-dot { width:14px; height:14px; border-radius:3px; flex-shrink:0; }
#dpad {
  position:fixed; bottom:max(env(safe-area-inset-bottom),16px);
  left:50%; transform:translateX(-50%);
  display:none; flex-direction:column; align-items:center; gap:4px; z-index:50; opacity:0.85;
}
.dpad-row { display:flex; gap:4px; }
.dpad-btn {
  width:60px; height:60px;
  background:rgba(255,215,0,0.18); border:1.5px solid rgba(255,215,0,0.4);
  border-radius:10px; color:#ffd700; font-size:24px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; user-select:none; -webkit-tap-highlight-color:transparent; touch-action:manipulation;
}
.dpad-btn:active { background:rgba(255,215,0,0.35); transform:scale(0.92); }
.dpad-spacer { width:60px; height:60px; }

/* HUD overlay buttons (sound + pause) */
#hud-btns {
  position:fixed; top:0; right:6px;
  top:env(safe-area-inset-top,0px);
  display:none; flex-direction:row; align-items:center; gap:5px;
  z-index:200;
  height:max(44px, 8vh);
}
.hud-btn {
  background:rgba(255,215,0,0.13);
  border:1.5px solid rgba(255,215,0,0.3);
  border-radius:8px; color:#ffd700;
  font-size:clamp(16px,4.5vw,22px);
  width:clamp(36px,9vw,44px); height:clamp(36px,9vw,44px);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; user-select:none;
  -webkit-tap-highlight-color:transparent; touch-action:manipulation;
  transition:background 0.12s, transform 0.1s;
}
.hud-btn:active { background:rgba(255,215,0,0.28); transform:scale(0.88); }

/* Pause overlay */
#overlay-pause {
  position:fixed; inset:0;
  background:rgba(8,6,18,0.94);
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  text-align:center; padding:24px; z-index:150;
}
.pause-btn {
  width: min(320px,88vw);
  padding:clamp(13px,3vh,18px) clamp(18px,5vw,28px);
  border:none; border-radius:14px; cursor:pointer;
  font-family:'Arial Black',Arial,sans-serif;
  font-size:clamp(15px,4.5vw,20px); font-weight:900;
  letter-spacing:0.04em; margin-top:12px;
  -webkit-tap-highlight-color:transparent; touch-action:manipulation;
  transition:transform 0.1s;
}
.pause-btn:active { transform:scale(0.96); }
.pause-btn.resume {
  background:linear-gradient(135deg,#1a3a1a,#0e2a0e);
  border:1.5px solid rgba(0,200,60,0.4);
  color:#44ee66;
  box-shadow:0 4px 20px rgba(0,180,0,0.25);
}
.pause-btn.menu {
  background:linear-gradient(135deg,#2a1a0e,#1a0e06);
  border:1.5px solid rgba(255,160,0,0.35);
  color:#ffaa33;
  box-shadow:0 4px 20px rgba(220,120,0,0.2);
}
</style>
</head>
<body>
<div id="wrapper"><canvas id="gameCanvas"></canvas></div>

<!-- Sound + Pause buttons (shown during gameplay) -->
<div id="hud-btns">
  <div class="hud-btn" id="btn-sound" title="Geluid aan/uit" onclick="toggleSound()">🔊</div>
  <div class="hud-btn" id="btn-pause" title="Pauze" onclick="togglePause()">🚬</div>
</div>

<!-- Pause overlay -->
<div id="overlay-pause">
  <div style="font-size:clamp(40px,14vw,68px);margin-bottom:14px;filter:drop-shadow(0 0 16px rgba(255,180,0,0.6))">🚬</div>
  <div style="font-size:clamp(24px,8vw,46px);color:#ffd700;font-weight:900;line-height:1.1;text-shadow:0 0 18px rgba(255,200,0,0.5),3px 3px 0 #7a4000;margin-bottom:8px;">PAUZE</div>
  <div style="font-size:clamp(11px,3vw,15px);color:rgba(255,255,255,0.45);margin-bottom:24px;font-family:Arial,sans-serif;">Dick rookt een sigaretje...</div>
  <button class="pause-btn resume" onclick="togglePause()">▶ Doorgaan</button>
  <button class="pause-btn menu" onclick="goToMenu()">🏠 Terug naar menu</button>
</div>

<div id="dpad">
  <div class="dpad-row"><div class="dpad-spacer"></div><div class="dpad-btn" id="btn-up">▲</div><div class="dpad-spacer"></div></div>
  <div class="dpad-row"><div class="dpad-btn" id="btn-left">◀</div><div class="dpad-spacer"></div><div class="dpad-btn" id="btn-right">▶</div></div>
  <div class="dpad-row"><div class="dpad-spacer"></div><div class="dpad-btn" id="btn-down">▼</div><div class="dpad-spacer"></div></div>
</div>

<div id="overlay-start" class="overlay">
  <div style="font-size:clamp(40px,14vw,70px);margin-bottom:12px;filter:drop-shadow(0 0 20px rgba(255,180,0,0.7))">🏅</div>
  <div class="overlay-title">DICK'S<br>DOOLHOF</div>
  <div class="overlay-sub">Bestuur Dick door het doolhof<br>Pak het sixpack — ontwijkt de vijanden!</div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#44ee66"></div>Sixpack = doel</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff4444"></div>Agent = gevaar</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff6eb0"></div>NEC-fan = gevaar</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffaa33"></div>Blikje = snelheid ⚡</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f5f5f5"></div>Sigaret = onzwakbaar 🚬</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffd700"></div>Geld = +500 pts 💰</div>
  </div>
  <button class="start-btn" onclick="startGame()">🍺 Start Spel!</button>
</div>

<div id="overlay-gameover" class="overlay" style="display:none">
  <div style="font-size:clamp(36px,12vw,60px);margin-bottom:12px">💀</div>
  <div class="overlay-title">GAME OVER</div>
  <div class="overlay-score" id="go-score"></div>
  <div class="overlay-sub">Dick is er geweest...</div>
  <button class="start-btn" onclick="startGame()">🔄 Opnieuw</button>
</div>

<div id="overlay-level" class="overlay" style="display:none">
  <div style="font-size:clamp(36px,12vw,60px);margin-bottom:12px">🍺</div>
  <div class="overlay-title" id="lt-text">Lekker gewerkt!</div>
  <div class="overlay-sub" id="lt-sub"></div>
</div>

let audioCtx=null;
function ga(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function tone(f,tp,d,v){try{const c=ga(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=tp;o.frequency.setValueAtTime(f,c.currentTime);o.frequency.exponentialRampToValueAtTime(f*0.5,c.currentTime+d);g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}
function sfxMove(){if(!soundMuted)tone(180,'square',0.05,0.06);}
function sfxPickup(){if(!soundMuted){tone(660,'sine',0.12,0.18);setTimeout(()=>tone(880,'sine',0.1,0.15),70);}}
function sfxDeath(){if(!soundMuted){tone(200,'sawtooth',0.25,0.22);setTimeout(()=>tone(130,'sawtooth',0.35,0.18),180);}}
function sfxLevel(){if(!soundMuted)[440,550,660,880].forEach((f,i)=>setTimeout(()=>tone(f,'sine',0.14,0.18),i*90));}
function sfxPow(){if(!soundMuted)[330,440,550].forEach((f,i)=>setTimeout(()=>tone(f,'triangle',0.1,0.16),i*60));}

const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
let gameState='start';

function resize(){
  const W=window.innerWidth,H=window.innerHeight;
  canvas.width=W;canvas.height=H;
  if(gameState==='playing'||gameState==='levelTransition')computeLayout();
}
window.addEventListener('resize',resize);

function computeLayout(){
  const W=canvas.width,H=canvas.height;
  const isMob='ontouchstart' in window;
  const dpadH=isMob?200:0;
  const hudH=Math.max(44,Math.round(H*0.08));
  const availH=H-hudH-dpadH-16;
  const availW=W-8;
  const tsH=Math.floor(availH/mapRows);
  const tsW=Math.floor(availW/mapCols);
  tileSize=Math.max(20,Math.min(tsH,tsW));
  offsetX=Math.floor((W-tileSize*mapCols)/2);
  offsetY=hudH+4;
}

function loadLevel(idx){
  const raw=LEVELS[idx%LEVELS.length];
  mapRows=raw.length;mapCols=raw[0].length;
  mapGrid=raw.map(r=>[...r]);
  enemies=[];items=[];
  for(let r=0;r<mapRows;r++)for(let c=0;c<mapCols;c++){
    const t=mapGrid[r][c];
    if(t===T.START){player.x=c;player.y=r;player.dir=1;nextDir=1;mapGrid[r][c]=T.EMPTY;}
    else if(t===T.POLICE){enemies.push({x:c,y:r,type:'police',dir:1,timer:0,interval:300,startX:c,startY:r});mapGrid[r][c]=T.EMPTY;}
    else if(t===T.NEC){enemies.push({x:c,y:r,type:'nec',dir:0,timer:0,interval:420,startX:c,startY:r});mapGrid[r][c]=T.EMPTY;}
    else if(t===T.SPEED||t===T.INVINCIBLE||t===T.MONEY||t===T.SIGN){items.push({x:c,y:r,type:t});mapGrid[r][c]=T.EMPTY;}
  }
  const mult=1+idx*0.28;
  enemies.forEach(e=>{e.interval=Math.max(120,Math.floor(e.interval/mult));});
  computeLayout();
}

function canMove(x,y,d){
  const nx=x+DX[d],ny=y+DY[d];
  if(ny<0||ny>=mapRows||nx<0||nx>=mapCols)return false;
  const t=mapGrid[ny][nx];
  return t!==T.WALL;
}

function movePlayer(dt){
  moveTimer+=dt;
  const spd=speedBoost?moveInterval/2:moveInterval;
  if(moveTimer<spd)return;
  moveTimer=0;
  if(canMove(player.x,player.y,nextDir)){player.dir=nextDir;player.x+=DX[nextDir];player.y+=DY[nextDir];sfxMove();}
  else if(canMove(player.x,player.y,player.dir)){player.x+=DX[player.dir];player.y+=DY[player.dir];sfxMove();}
  checkPickups();checkFinish();
}

function checkPickups(){
  items=items.filter(item=>{
    if(item.x===player.x&&item.y===player.y){
      if(item.type===T.SPEED){speedBoost=true;speedTimer=5000;sfxPow();}
      else if(item.type===T.INVINCIBLE){invincible=true;invincTimer=5000;sfxPow();}
      else if(item.type===T.MONEY){score+=500;sfxPickup();}
      return false;
    }
    return true;
  });
}

function checkFinish(){
  if(mapGrid[player.y][player.x]===T.FINISH){
    sfxLevel();score+=1000*(currentLevel+1);
    gameState='levelTransition';transTimer=2500;
    document.getElementById('lt-text').textContent='Lekker gewerkt! 🍺';
    document.getElementById('lt-sub').textContent='Volgende level start zo...';
    document.getElementById('overlay-level').style.display='flex';
  }
}

function resetPositions(){
  const raw=LEVELS[currentLevel%LEVELS.length];
  for(let r=0;r<mapRows;r++)for(let c=0;c<mapCols;c++)if(raw[r][c]===T.START){player.x=c;player.y=r;player.dir=1;nextDir=1;}
  enemies.forEach((e,i)=>{e.x=e.startX;e.y=e.startY;e.timer=0;e.dir=i%2;});
  speedBoost=false;invincible=false;invincBlink=0;moveTimer=0;
}

function moveEnemy(e,dt){
  e.timer+=dt;if(e.timer<e.interval)return;e.timer=0;
  if(e.type==='police'){
    if(canMove(e.x,e.y,e.dir)){e.x+=DX[e.dir];e.y+=DY[e.dir];}
    else{e.dir=(e.dir+2)%4;if(canMove(e.x,e.y,e.dir)){e.x+=DX[e.dir];e.y+=DY[e.dir];}}
  }else{
    const cc=Math.min(0.65,0.1+currentLevel*0.15);
    if(Math.random()<cc){
      const dx=player.x-e.x,dy=player.y-e.y;
      const pref=Math.abs(dx)>Math.abs(dy)?[dx>0?1:3,dy>0?2:0,dy>0?0:2,dx>0?3:1]:[dy>0?2:0,dx>0?1:3,dx>0?3:1,dy>0?0:2];
      for(const d of pref)if(canMove(e.x,e.y,d)){e.x+=DX[d];e.y+=DY[d];break;}
    }else{
      const sh=[0,1,2,3].sort(()=>Math.random()-0.5);
      for(const d of sh)if(canMove(e.x,e.y,d)){e.x+=DX[d];e.y+=DY[d];break;}
    }
  }
}

function checkCollision(){
  for(const e of enemies){
    if(e.x===player.x&&e.y===player.y){
      if(invincible)return;
      sfxDeath();lives--;
      if(lives<=0){gameState='gameover';document.getElementById('go-score').textContent='Score: '+score+' punten';document.getElementById('overlay-gameover').style.display='flex';document.getElementById('dpad').style.display='none';document.getElementById('hud-btns').style.display='none';}
      else resetPositions();
      return;
    }
  }
}

// RENDER HELPERS
function px(c){return offsetX+c*tileSize;}
function py(r){return offsetY+r*tileSize;}

// Draw image scaled to tile, with optional extra size factor for bigger sprites
function drawImg(img,c,r,sc,extraOffX,extraOffY){
  if(!img||!img.complete||!img.naturalWidth)return;
  const s=tileSize*sc;
  const ox=extraOffX||0, oy=extraOffY||0;
  ctx.drawImage(img,px(c)+(tileSize-s)/2+ox,py(r)+(tileSize-s)/2+oy,s,s);
}

// Draw image spanning multiple tiles with center at given tile
function drawBig(img,c,r,tiles){
  if(!img||!img.complete||!img.naturalWidth)return;
  const s=tileSize*tiles;
  ctx.drawImage(img,px(c)+tileSize/2-s/2,py(r)+tileSize/2-s/2,s,s);
}

function glow(x,y,color,rad){
  const g=ctx.createRadialGradient(x,y,0,x,y,rad);
  g.addColorStop(0,color);g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.fillRect(x-rad,y-rad,rad*2,rad*2);
}

function drawGame(){
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0d0b14';ctx.fillRect(0,0,W,H);

  // TILES
  for(let r=0;r<mapRows;r++){
    for(let c=0;c<mapCols;c++){
      const t=mapGrid[r][c];
      const x=px(c),y=py(r),s=tileSize;
      if(t===T.WALL){
        const gr=ctx.createLinearGradient(x,y,x+s,y+s);
        gr.addColorStop(0,'#261642');gr.addColorStop(1,'#150e26');
        ctx.fillStyle=gr;ctx.fillRect(x,y,s,s);
        ctx.strokeStyle='rgba(120,60,200,0.25)';ctx.lineWidth=1;
        ctx.strokeRect(x+0.5,y+0.5,s-1,s-1);
      }else if(t===T.EMPTY){
        ctx.fillStyle='#0f0d1e';ctx.fillRect(x,y,s,s);
        ctx.strokeStyle='rgba(255,255,255,0.025)';ctx.lineWidth=0.5;
        ctx.strokeRect(x,y,s,s);
      }else if(t===T.FINISH){
        ctx.fillStyle='#081508';ctx.fillRect(x,y,s,s);
        // Animated pulse ring
        const pulse=0.6+0.4*Math.sin(Date.now()*0.006);
        const gr2=ctx.createRadialGradient(x+s/2,y+s/2,0,x+s/2,y+s/2,s*1.2);
        gr2.addColorStop(0,`rgba(0,220,80,${0.25*pulse})`);
        gr2.addColorStop(1,'transparent');
        ctx.fillStyle=gr2;ctx.fillRect(x-s/2,y-s/2,s*2,s*2);
        ctx.strokeStyle=`rgba(0,230,80,${pulse*0.7})`;ctx.lineWidth=2;
        ctx.strokeRect(x+2,y+2,s-4,s-4);
        // Sixpack — drawn 2x tile size, centered on this tile
        drawBig(IMGS.sixpack,c,r,2.2);
      }
    }
  }

  // COLLECTIBLE ITEMS
  for(const it of items){
    const x=px(it.x),y=py(it.y),s=tileSize;
    if(it.type===T.SIGN){
      // Signs are 1.8x tile
      drawBig(IMGS.sign,it.x,it.y,1.8);
    }else if(it.type===T.SPEED){
      ctx.fillStyle='rgba(68,238,102,0.08)';ctx.fillRect(x,y,s,s);
      // Klok blikje 1.8x
      drawBig(IMGS.klok,it.x,it.y,1.8);
    }else if(it.type===T.INVINCIBLE){
      ctx.fillStyle='rgba(245,245,245,0.07)';ctx.fillRect(x,y,s,s);
      drawBig(IMGS.sigar,it.x,it.y,1.9);
    }else if(it.type===T.MONEY){
      ctx.fillStyle='rgba(255,215,0,0.08)';ctx.fillRect(x,y,s,s);
      drawBig(IMGS.money,it.x,it.y,1.9);
    }
  }

  // ENEMIES
  for(const e of enemies){
    const cx2=px(e.x)+tileSize/2,cy2=py(e.y)+tileSize/2;
    if(e.type==='police')glow(cx2,cy2,'rgba(255,50,50,0.22)',tileSize*1.5);
    else glow(cx2,cy2,'rgba(255,110,176,0.2)',tileSize*1.4);
    // Enemies drawn 2x tile size
    drawBig(e.type==='police'?IMGS.police:IMGS.nec,e.x,e.y,2.1);
  }

  // PLAYER
  const blink=invincible&&Math.floor(invincBlink/5)%2===0;
  if(!blink){
    const cx2=px(player.x)+tileSize/2,cy2=py(player.y)+tileSize/2;
    if(speedBoost)glow(cx2,cy2,'rgba(68,238,102,0.35)',tileSize*1.6);
    if(invincible)glow(cx2,cy2,'rgba(255,255,255,0.25)',tileSize*1.5);
    // Player drawn 2.1x tile size
    const s=tileSize*2.1;
    if(player.dir===3){
      ctx.save();
      ctx.translate(px(player.x)+tileSize/2+s/2, py(player.y)+tileSize/2-s/2);
      ctx.scale(-1,1);
      if(IMGS.scooter.complete&&IMGS.scooter.naturalWidth)ctx.drawImage(IMGS.scooter,0,0,s,s);
      ctx.restore();
    }else{
      if(IMGS.scooter.complete&&IMGS.scooter.naturalWidth)
        ctx.drawImage(IMGS.scooter,px(player.x)+tileSize/2-s/2,py(player.y)+tileSize/2-s/2,s,s);
    }
  }

  // HUD
  drawHUD();
}

function drawHUD(){
  const W=canvas.width,H=canvas.height;
  const hh=Math.max(44,Math.round(H*0.08));
  ctx.fillStyle='rgba(8,6,18,0.93)';ctx.fillRect(0,0,W,hh);
  ctx.strokeStyle='rgba(255,200,80,0.2)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,hh);ctx.lineTo(W,hh);ctx.stroke();
  const fs=Math.max(14,Math.floor(hh*0.44));
  // Reserve ~100px on the right for the HTML buttons
  const btnReserve = Math.max(90, hh * 2.2);
  ctx.font=`900 ${fs}px 'Arial Black',Arial,sans-serif`;
  ctx.fillStyle='#ffd700';ctx.textBaseline='middle';
  // Lives on the LEFT
  ctx.textAlign='left';
  let ls='';for(let i=0;i<lives;i++)ls+='❤️';
  ctx.fillText(ls,10,hh/2);
  // Score in the CENTER (shifted slightly left to account for btn reserve)
  ctx.textAlign='center';ctx.fillText(`SCORE: ${score}`,(W-btnReserve)/2+10,hh/2);
  // Level on the right, before the button reserve
  ctx.textAlign='right';ctx.fillText(`LVL ${currentLevel+1}`,W-btnReserve-6,hh/2);
  if(speedBoost){ctx.fillStyle='#44ee66';ctx.font=`bold ${fs*0.78}px Arial`;ctx.textAlign='left';ctx.fillText(`⚡${Math.ceil(speedTimer/1000)}s`,10,hh+fs*0.9);}
  if(invincible){ctx.fillStyle='#ddd';ctx.font=`bold ${fs*0.78}px Arial`;ctx.textAlign='left';ctx.fillText(`🚬${Math.ceil(invincTimer/1000)}s`,10,hh+fs*1.8);}
}

// GAME LOOP
function gameLoop(ts){
  const dt=Math.min(ts-lastTime,100);lastTime=ts;
  if(gameState==='playing' && !paused){
    if(speedBoost){speedTimer-=dt;if(speedTimer<=0)speedBoost=false;}
    if(invincible){invincTimer-=dt;invincBlink++;if(invincTimer<=0){invincible=false;invincBlink=0;}}
    movePlayer(dt);
    enemies.forEach(e=>moveEnemy(e,dt));
    checkCollision();
    drawGame();
  }else if(gameState==='levelTransition'){
    transTimer-=dt;drawGame();
    if(transTimer<=0){
      currentLevel++;loadLevel(currentLevel);gameState='playing';
      document.getElementById('overlay-level').style.display='none';
    }
  }
  requestAnimationFrame(gameLoop);
}

function toggleSound(){
  soundMuted=!soundMuted;
  document.getElementById('btn-sound').textContent=soundMuted?'🔇':'🔊';
}

function togglePause(){
  if(gameState!=='playing')return;
  paused=!paused;
  const ov=document.getElementById('overlay-pause');
  const dp=document.getElementById('dpad');
  if(paused){
    ov.style.display='flex';
    dp.style.display='none';
  }else{
    ov.style.display='none';
    if('ontouchstart' in window)dp.style.display='flex';
    lastTime=performance.now(); // prevent dt spike on resume
  }
}

function goToMenu(){
  paused=false;
  gameState='start';
  document.getElementById('overlay-pause').style.display='none';
  document.getElementById('dpad').style.display='none';
  document.getElementById('hud-btns').style.display='none';
  window.location.href='index.html';
}

function startGame(){
  score=0;lives=3;currentLevel=0;paused=false;
  loadLevel(0);gameState='playing';
  document.getElementById('overlay-start').style.display='none';
  document.getElementById('overlay-gameover').style.display='none';
  document.getElementById('overlay-level').style.display='none';
  document.getElementById('overlay-pause').style.display='none';
  document.getElementById('hud-btns').style.display='flex';
  if('ontouchstart' in window)document.getElementById('dpad').style.display='flex';
  resize();
}

// INPUT
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){togglePause();return;}
  if(gameState!=='playing'||paused)return;
  if(e.key==='ArrowUp'||e.key==='w')nextDir=0;
  else if(e.key==='ArrowRight'||e.key==='d')nextDir=1;
  else if(e.key==='ArrowDown'||e.key==='s')nextDir=2;
  else if(e.key==='ArrowLeft'||e.key==='a')nextDir=3;
  e.preventDefault();
});

['up','right','down','left'].forEach((dir,i)=>{
  const btn=document.getElementById('btn-'+dir);
  const d=i===0?0:i===1?1:i===2?2:3;
  btn.addEventListener('touchstart',e=>{nextDir=d;e.preventDefault();},{passive:false});
  btn.addEventListener('click',()=>nextDir=d);
});

let tx=0,ty=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  if(gameState!=='playing'||paused)return;
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<20&&Math.abs(dy)<20)return;
  nextDir=Math.abs(dx)>Math.abs(dy)?(dx>0?1:3):(dy>0?2:0);
},{passive:true});

resize();
requestAnimationFrame(ts=>{lastTime=ts;requestAnimationFrame(gameLoop);});
</script>
