<canvas id="c"></canvas>
<script>
'use strict';

// ─────────────────────────────────────────────
// IMAGE REFERENCES (loaded from hidden <img> tags)
// ─────────────────────────────────────────────
const IMG_SCOOTER = document.getElementById('img_scooter');
const IMG_CAN     = document.getElementById('img_can');
const IMG_KID     = document.getElementById('img_kid');


const cv = document.getElementById('c');
const cx = cv.getContext('2d');

// ─────────────────────────────────────────────
// CONSTANTS & GLOBALS
// ─────────────────────────────────────────────
const S = {MENU:0, PLAYING:1, PAUSED:2, LEVEL_WIN:3, GAME_OVER:4, GAME_WIN:5};
let state = S.MENU;
let currentLevel = 0;
let totalScore = 0;
let levelScore = 0;
let cansLeft = 0;
let totalCans = 0;
let stars = 0;

let W, H, GY, CAT_X, CAT_Y, HAND_X, HAND_Y;
const GRAVITY = 0.38;
const MAX_DRAG_SCALE = 0.2;
let maxDrag = 100;

// ─────────────────────────────────────────────
// BG CACHE (declared early — used inside resize)
// ─────────────────────────────────────────────
let bgCache = null;
let bgCacheLevel = -1;

// ─────────────────────────────────────────────
// RESIZE
// ─────────────────────────────────────────────
function resize() {
  W = cv.width  = window.innerWidth;
  H = cv.height = window.innerHeight;
  GY     = Math.floor(H * 0.77);
  CAT_X  = Math.floor(W * 0.14);
  CAT_Y  = GY - 52;
  maxDrag = Math.min(W, H) * MAX_DRAG_SCALE;
  // Dick's throwing hand position (right hand, mirrored image)
  const _sz = Math.min(W * 0.22, 110);
  HAND_X = Math.floor(CAT_X + _sz * 0.28);
  HAND_Y = Math.floor(GY   - _sz * 0.52);
  bgCache = null; // force background redraw
}
resize();
window.addEventListener('resize', () => { resize(); if (state===S.PLAYING||state===S.PAUSED) initLevel(currentLevel); });

// ─────────────────────────────────────────────
// SEEDED RANDOM (deterministic per seed)
// ─────────────────────────────────────────────
function sr(n, off=0) {
  const x = Math.sin(n * 127.1 + off * 311.7 + 78.233) * 43758.5453;
  return x - Math.floor(x);
}

// ─────────────────────────────────────────────
// BG CACHE
// ─────────────────────────────────────────────
function getBgCanvas(level) {
  if (bgCache && bgCacheLevel === level) return bgCache;
  bgCacheLevel = level;
  const bc = document.createElement('canvas');
  bc.width = W; bc.height = H;
  const bx = bc.getContext('2d');
  paintBackground(bx, level, W, H, GY);
  bgCache = bc;
  return bc;
}

// ─────────────────────────────────────────────
// BACKGROUND PAINTER
// ─────────────────────────────────────────────
function paintBackground(c2, lvl, w, h, gy) {
  if (lvl === 0) {
    // Arnhem-Zuid
    const sky = c2.createLinearGradient(0,0,0,gy);
    sky.addColorStop(0,'#1e2530'); sky.addColorStop(1,'#374055');
    c2.fillStyle = sky; c2.fillRect(0,0,w,gy);

    // Clouds
    c2.fillStyle = 'rgba(45,52,68,0.7)';
    [[0.18,0.07,55],[0.55,0.04,70],[0.82,0.1,48]].forEach(([px,py,r])=>{
      paintCloud(c2, w*px, h*py, r);
    });

    // Houses (seeded)
    let hx = w*0.28;
    for (let i=0; i<20; i++) {
      const hw = 32+sr(i,0)*22, hh = 50+sr(i,1)*45;
      const shade = Math.floor(28+sr(i,2)*12);
      c2.fillStyle = `rgb(${shade},${shade-4},${shade-8})`;
      c2.fillRect(hx, gy-hh, hw, hh);
      // window
      c2.fillStyle = sr(i,3)>0.5 ? '#9a7018' : '#111';
      c2.fillRect(hx+5, gy-hh+10, 9, 7);
      if (hw>40) c2.fillRect(hx+hw-15, gy-hh+10, 9, 7);
      // roof
      c2.fillStyle = `rgb(${shade-10},${shade-14},${shade-18})`;
      c2.beginPath();
      c2.moveTo(hx-2, gy-hh); c2.lineTo(hx+hw/2, gy-hh-14); c2.lineTo(hx+hw+2, gy-hh);
      c2.fill();
      hx += hw + 1 + sr(i,4)*3;
    }
    // Graffiti on a wall
    c2.font = `bold ${h*0.025}px sans-serif`;
    c2.fillStyle = 'rgba(200,30,30,0.55)';
    c2.fillText('NEC NOOIT!!', w*0.58, gy-18);

  } else if (lvl === 1) {
    // De Waalbrug
    const sky = c2.createLinearGradient(0,0,0,gy);
    sky.addColorStop(0,'#101520'); sky.addColorStop(1,'#1a2340');
    c2.fillStyle = sky; c2.fillRect(0,0,w,gy);

    // River
    const river = c2.createLinearGradient(0,gy*0.82,0,gy);
    river.addColorStop(0,'#0a1825'); river.addColorStop(1,'#050e18');
    c2.fillStyle = river; c2.fillRect(0,gy*0.82,w,gy*0.18+4);

    // River shimmer
    c2.strokeStyle = 'rgba(50,100,150,0.25)';
    for (let i=0;i<6;i++) {
      c2.lineWidth = 1+sr(i)*1.5;
      c2.beginPath();
      c2.moveTo(0, gy*0.83+i*gy*0.025);
      c2.lineTo(w, gy*0.85+sr(i,1)*gy*0.02);
      c2.stroke();
    }

    // Bridge arch (green steel)
    const archCX = w*0.5, archCY = gy + h*0.35, archR = h*0.42;
    c2.strokeStyle = '#2a5a2a'; c2.lineWidth = 10;
    c2.beginPath(); c2.arc(archCX, archCY, archR, Math.PI*1.1, Math.PI*1.9); c2.stroke();
    // Vertical cables
    c2.strokeStyle = '#264826'; c2.lineWidth = 2;
    for (let i=0;i<12;i++) {
      const angle = Math.PI*1.1 + (i/(11))*Math.PI*0.8;
      const topX = archCX + Math.cos(angle)*archR;
      const topY = archCY + Math.sin(angle)*archR;
      c2.beginPath(); c2.moveTo(topX,topY); c2.lineTo(archCX+Math.cos(angle)*(archR*0.3), gy*0.85); c2.stroke();
    }
    // Bridge deck
    c2.fillStyle = '#1e3a1e'; c2.fillRect(0, gy*0.82, w, 8);

  } else {
    // De Goffert – apocalyptic stadium
    const sky = c2.createLinearGradient(0,0,0,gy);
    sky.addColorStop(0,'#1a0505'); sky.addColorStop(0.6,'#2a0a08'); sky.addColorStop(1,'#150303');
    c2.fillStyle = sky; c2.fillRect(0,0,w,gy);

    // Blood-red smoke clouds
    [0.2,0.5,0.75].forEach((px,i)=>{
      const g = c2.createRadialGradient(w*px, gy*0.4, 0, w*px, gy*0.4, w*0.18);
      g.addColorStop(0,'rgba(80,10,5,0.4)'); g.addColorStop(1,'rgba(0,0,0,0)');
      c2.fillStyle = g; c2.fillRect(0,0,w,h);
    });

    // Stadium silhouette
    c2.fillStyle = '#160404';
    c2.fillRect(w*0.25, gy*0.35, w*0.7, gy*0.65);
    // Battlements
    for (let i=0;i<22;i++) {
      c2.fillStyle = i%2===0 ? '#1a0505' : '#0d0202';
      c2.fillRect(w*0.25 + i*w*0.032, gy*0.29, w*0.025, gy*0.07);
    }
    // Floodlights
    [0.3, 0.55, 0.8].forEach(px => {
      const gl = c2.createRadialGradient(w*px, gy*0.28, 0, w*px, gy*0.28, 90);
      gl.addColorStop(0,'rgba(255,160,60,0.25)'); gl.addColorStop(1,'rgba(0,0,0,0)');
      c2.fillStyle = gl; c2.fillRect(0,0,w,h);
    });
    // Burning tires glow
    [0.3,0.6].forEach((px,i)=>{
      const g2 = c2.createRadialGradient(w*px, gy, 0, w*px, gy, 120);
      g2.addColorStop(0,'rgba(255,60,0,0.35)'); g2.addColorStop(1,'rgba(0,0,0,0)');
      c2.fillStyle = g2; c2.fillRect(0,0,w,h);
    });
  }
}

function paintCloud(c2, x, y, r) {
  c2.beginPath();
  c2.arc(x,y,r,0,Math.PI*2);
  c2.arc(x+r*0.65,y-r*0.22,r*0.65,0,Math.PI*2);
  c2.arc(x-r*0.55,y+r*0.1,r*0.55,0,Math.PI*2);
  c2.fill();
}

function spawnParticles(x, y, color, count, spd) {
  for (let i=0;i<count;i++) {
    const a=Math.random()*Math.PI*2, s=(0.5+Math.random())*spd;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-Math.random()*2,
      r:2+Math.random()*4,color,life:1,decay:0.025+Math.random()*0.04});
  }
}
function spawnDebris(x,y,type) {
  const cols={wood:'#9a7018',brick:'#903030',pipe:'#507070'};
  const col=cols[type]||'#888';
  for(let i=0;i<6;i++){
    const a=Math.random()*Math.PI*2,s=2+Math.random()*5;
    debris.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-4,
      w:7+Math.random()*14,h:5+Math.random()*9,
      rot:Math.random()*Math.PI*2,rotV:(Math.random()-0.5)*0.25,
      color:col,life:1,decay:0.018+Math.random()*0.025});
  }
}

function spawnScore(x,y,pts) {
  particles.push({x,y,vx:(Math.random()-0.5)*1,vy:-2.5,
    r:0,color:'#FFD700',life:1.2,decay:0.018,
    isText:true,text:'+'+pts});
}

// ─────────────────────────────────────────────
// SCORE HELPERS
// ─────────────────────────────────────────────
function addScore(pts,x,y) {
  levelScore+=pts; totalScore+=pts;
  if(x!==undefined) spawnScore(x,y,pts);
}
function calcStars() {
  const r=cansLeft/totalCans;
  return r>=0.5?3:r>=0.25?2:1;
}

// ─────────────────────────────────────────────
// PHYSICS UPDATE
// ─────────────────────────────────────────────
function update() {
  if (state!==S.PLAYING) return;

  // Enemies idle anim + scared proximity
  for (const e of enemies) {
    if(!e.alive) { e.deathAnim=Math.min(1,e.deathAnim+0.05); continue; }
    e.anim+=0.05;
    if (proj) {
      const ddx=e.x-proj.x,ddy=e.y-proj.y;
      e.scared = Math.sqrt(ddx*ddx+ddy*ddy) < 150;
    } else e.scared=false;
    if(e.bonk>0) e.bonk-=0.06;

    // apply velocity (knocked)
    if(e.vx||e.vy) {
      e.vy+=GRAVITY*0.5;
      e.x+=e.vx; e.y+=e.vy;
      e.vx*=0.92;
      if(e.y>=GY-e.r*0.4){
        e.y=GY-e.r*0.4;
        e.vy*=-0.3;
        if(Math.abs(e.vy)<0.5){e.vy=0;e.vx=0;}
      }
      if(e.y>H+50){e.alive=false;addScore(e.boss?300:60,e.x,e.y-30);}
    }
  }

  // Block support / falling
  for(const b of blocks) {
    if(!b.alive) continue;
    if(!isSupported(b)){
      b.vy+=GRAVITY*0.55;
      b.y+=b.vy; b.x+=b.vx;
      b.vx*=0.9;
      if(b.y+b.h>=GY){
        b.y=GY-b.h; b.vy*=-0.25;
        if(Math.abs(b.vy)<0.5){b.vy=0;b.vx=0;}
        // crush enemies on ground
        for(const e of enemies){
          if(!e.alive) continue;
          if(e.x>b.x-5&&e.x<b.x+b.w+5&&e.y>=GY-e.r*2&&e.y<=GY+5){
            e.hp-=1;
            e.vy=-3; e.vx=(Math.random()-0.5)*3;
            if(e.hp<=0){e.alive=false;addScore(e.boss?300:80,e.x,e.y-30);spawnParticles(e.x,e.y,'#ff4444',16,6);}
          }
        }
      }
    }
  }

  // Projectile
  if(proj) {
    proj.vy+=GRAVITY;
    proj.x+=proj.vx; proj.y+=proj.vy;
    proj.angle=Math.atan2(proj.vy,proj.vx);
    proj.trail.push({x:proj.x,y:proj.y});
    if(proj.trail.length>14) proj.trail.shift();

    let hit=false;

    // Block collisions
    for(const b of blocks){
      if(!b.alive||hit) continue;
      if(circleRect(proj.x,proj.y,proj.r,b.x,b.y,b.w,b.h)){
        const spd=Math.hypot(proj.vx,proj.vy);
        const dmg=Math.max(1,Math.floor(spd/3.5));
        b.hp-=dmg;
        spawnParticles(proj.x,proj.y,blockColor(b.type),8,3.5);
        addScore(15);
        if(b.hp<=0){
          b.alive=false;
          spawnDebris(b.x+b.w/2,b.y+b.h/2,b.type);
          spawnParticles(b.x+b.w/2,b.y+b.h/2,blockColor(b.type),14,5);
          addScore(40,b.x+b.w/2,b.y);
          // push nearby enemies
          for(const e of enemies){
            if(!e.alive) continue;
            const ed=Math.hypot(e.x-(b.x+b.w/2),e.y-(b.y+b.h/2));
            if(ed<b.w*1.2){e.vx+=(e.x-(b.x+b.w/2))/ed*3;e.vy-=2;}
          }
        }
        // Deflect projectile
        const bCx=b.x+b.w/2,bCy=b.y+b.h/2;
        if(Math.abs(proj.x-bCx)/b.w*2 > Math.abs(proj.y-bCy)/b.h*2) proj.vx*=-0.45;
        else proj.vy*=-0.45;
        proj.vx*=0.75; proj.vx+=(Math.random()-0.5)*0.5;
        hit=true;
      }
    }

    // Enemy collisions
    for(const e of enemies){
      if(!e.alive||hit) continue;
      if(Math.hypot(proj.x-e.x,proj.y-e.y)<proj.r+e.r){
        const spd=Math.hypot(proj.vx,proj.vy);
        const dmg=Math.max(1,Math.floor(spd/2.8));
        e.hp-=dmg;
        e.bonk=0.6;
        e.vx=proj.vx*0.4; e.vy=-4+proj.vy*0.2;
        spawnParticles(e.x,e.y,'#ff6040',12,5);
        if(e.hp<=0){
          e.alive=false;
          addScore(e.boss?500:100,e.x,e.y-40);
          spawnParticles(e.x,e.y,'#ff2020',20,7);
          spawnParticles(e.x,e.y,'#44dd44',10,4);
        }
        proj.vy*=-0.3; proj.vx*=0.5;
        hit=true;
      }
    }

    // OOB
    if(proj.y>GY+30||proj.x>W+60||proj.x<-60){
      proj=null;
      checkEnd();
    }
  }

  // Particles
  particles=particles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy;
    if(!p.isText) p.vy+=0.14;
    p.vx*=0.97; p.life-=p.decay;
    return p.life>0;
  });
  debris=debris.filter(d=>{
    d.x+=d.vx; d.y+=d.vy; d.vy+=0.28; d.vx*=0.97;
    d.rot+=d.rotV; d.life-=d.decay;
    if(d.y>GY+d.h) d.vy*=-0.5;
    return d.life>0;
  });

  // Victory / defeat check
  if(!showingVictory && enemies.filter(e=>e.alive).length===0) {
    showingVictory=true;
    stars=calcStars();
    addScore(cansLeft*80);
    setTimeout(()=>{ state = currentLevel>=LEVELS.length-1?S.GAME_WIN:S.LEVEL_WIN; },700);
  }
}

function isSupported(b) {
  if(b.y+b.h>=GY-2) return true;
  for(const other of blocks){
    if(other===b||!other.alive) continue;
    const cx1=b.x+b.w/2,cx2=other.x+other.w/2;
    if(Math.abs(cx1-cx2)<b.w*0.65 && other.y>=b.y+b.h-4 && other.y<=b.y+b.h+10) return true;
  }
  return false;
}
function circleRect(cx,cy,cr,rx,ry,rw,rh){
  const nx=Math.max(rx,Math.min(cx,rx+rw)),ny=Math.max(ry,Math.min(cy,ry+rh));
  return (cx-nx)**2+(cy-ny)**2<cr*cr;
}
function blockColor(t){return{wood:'#c8901a',brick:'#c03030',pipe:'#70a0a0'}[t]||'#aaa';}
function checkEnd(){
  if(enemies.filter(e=>e.alive).length===0) return; // handled separately
  if(cansLeft===0&&!proj) setTimeout(()=>{ state=S.GAME_OVER; },800);
}

// ─────────────────────────────────────────────
// INPUT
// ─────────────────────────────────────────────
let drag=null; // {cx,cy}
const CAT_TOUCH_R = 90;

function getPos(e) {
  const r=cv.getBoundingClientRect();
  const sx=W/r.width, sy=H/r.height;
  const src=e.touches?e.touches[0]:e;
  return {x:(src.clientX-r.left)*sx, y:(src.clientY-r.top)*sy};
}
function inRect(p,x,y,w,h){return p.x>=x&&p.x<=x+w&&p.y>=y&&p.y<=y+h;}
function hitBtn(p,cx,cy,bw,bh){return inRect(p,cx-bw/2,cy-bh/2,bw,bh);}

function onDown(e) {
  e.preventDefault();
  const p=getPos(e);

  if(state===S.MENU) { menuClick(p); return; }
  if(state===S.PAUSED) { pauseClick(p); return; }
  if(state===S.LEVEL_WIN) { winClick(p); return; }
  if(state===S.GAME_OVER) { loseClick(p); return; }
  if(state===S.GAME_WIN) { state=S.MENU; return; }
  if(state!==S.PLAYING) return;

  // Pause btn
  if(p.x>W-72&&p.y<80) { state=S.PAUSED; return; }
  // Reset btn
  if(inRect(p, W/2-75, H-52, 150, 42)) { initLevel(currentLevel); return; }

  // Start sling drag
  if(!proj&&Math.hypot(p.x-HAND_X,p.y-HAND_Y)<CAT_TOUCH_R) {
    drag={cx:HAND_X,cy:HAND_Y};
  }
}
function onMove(e) {
  e.preventDefault();
  if(!drag||state!==S.PLAYING) return;
  const p=getPos(e);
  const dx=p.x-CAT_X, dy=p.y-CAT_Y;
  const d=Math.hypot(dx,dy);
  if(d>maxDrag){ drag.cx=CAT_X+dx/d*maxDrag; drag.cy=CAT_Y+dy/d*maxDrag; }
  else { drag.cx=p.x; drag.cy=p.y; }
}
function onUp(e) {
  e.preventDefault();
  if(!drag||state!==S.PLAYING) return;
  const ddx=HAND_X-drag.cx, ddy=HAND_Y-drag.cy;
  const spd=Math.hypot(ddx,ddy);
  if(spd>12) {
    const sc=0.14;
    proj={x:HAND_X,y:HAND_Y,vx:ddx*sc,vy:ddy*sc-0.5,r:12,angle:0,trail:[]};
    cansLeft--;
  }
  drag=null;
}

// ─────────────────────────────────────────────
// DRAWING HELPERS
// ─────────────────────────────────────────────
function rrect(c2,x,y,w,h,r) {
  c2.beginPath();
  c2.moveTo(x+r,y); c2.lineTo(x+w-r,y);
  c2.arc(x+w-r,y+r,r,-Math.PI/2,0);
  c2.lineTo(x+w,y+h-r);
  c2.arc(x+w-r,y+h-r,r,0,Math.PI/2);
  c2.lineTo(x+r,y+h);
  c2.arc(x+r,y+h-r,r,Math.PI/2,Math.PI);
  c2.lineTo(x,y+r);
  c2.arc(x+r,y+r,r,Math.PI,-Math.PI/2);
  c2.closePath();
}

function drawBtn(c2,text,cx,cy,bw,bh,col,textCol='#fff',icon='') {
  const x=cx-bw/2,y=cy-bh/2;
  // shadow
  c2.fillStyle='rgba(0,0,0,0.55)';
  rrect(c2,x+3,y+3,bw,bh,7); c2.fill();
  // body
  c2.fillStyle=col;
  rrect(c2,x,y,bw,bh,7); c2.fill();
  // top sheen
  c2.save();
  c2.beginPath(); rrect(c2,x,y,bw,bh/2,7); c2.clip();

  c2.font=`bold ${bh*0.5}px Bangers,sans-serif`;
  c2.fillStyle=textCol;
  c2.textAlign='center'; c2.textBaseline='middle';
  c2.shadowColor='rgba(0,0,0,0.9)'; c2.shadowBlur=5;

}

// ─────────────────────────────────────────────
// DRAW: BLOCKS
// ─────────────────────────────────────────────
function drawBlock(b) {
  if(!b.alive) return;
  const dr=1-(b.hp/b.maxHp);
  cx.save();

  if(b.type==='wood'){
    const g=cx.createLinearGradient(b.x,b.y,b.x+b.w,b.y+b.h);
    g.addColorStop(0,`rgb(${Math.floor(155+dr*30)},${Math.floor(100-dr*20)},25)`);
    g.addColorStop(1,`rgb(${Math.floor(105+dr*20)},${Math.floor(65-dr*15)},15)`);
    cx.fillStyle=g;
  } else if(b.type==='brick'){
    cx.fillStyle=`rgb(${Math.floor(140-dr*25)},${Math.floor(42-dr*10)},${Math.floor(42-dr*10)})`;
  } else {
    cx.fillStyle=`rgb(${Math.floor(60+dr*10)},${Math.floor(90-dr*15)},${Math.floor(90-dr*15)})`;
  }
  cx.fillRect(b.x,b.y,b.w,b.h);

  // Detail
  if(b.type==='wood'){
    cx.strokeStyle='rgba(0,0,0,0.18)'; cx.lineWidth=1;
    for(let i=1;i<4;i++){
      cx.beginPath(); cx.moveTo(b.x+b.w*i/4,b.y+2); cx.lineTo(b.x+b.w*i/4,b.y+b.h-2); cx.stroke();
    }
    cx.beginPath(); cx.moveTo(b.x+3,b.y+b.h*0.45); cx.lineTo(b.x+b.w-3,b.y+b.h*0.45); cx.stroke();
  } else if(b.type==='brick'){
    cx.strokeStyle='rgba(0,0,0,0.2)'; cx.lineWidth=1;
    cx.beginPath(); cx.moveTo(b.x,b.y+b.h/2); cx.lineTo(b.x+b.w,b.y+b.h/2); cx.stroke();
    for(let i=0;i<3;i++){ cx.beginPath(); cx.moveTo(b.x+b.w*i/3,b.y); cx.lineTo(b.x+b.w*i/3,b.y+b.h/2); cx.stroke(); }
    for(let i=0;i<3;i++){ cx.beginPath(); cx.moveTo(b.x+b.w*(i+0.5)/3,b.y+b.h/2); cx.lineTo(b.x+b.w*(i+0.5)/3,b.y+b.h); cx.stroke(); }
  } else {
    // pipe bolts
    cx.fillStyle='rgba(200,200,200,0.3)';
    cx.beginPath(); cx.arc(b.x+6,b.y+b.h/2,3,0,Math.PI*2); cx.fill();
    cx.beginPath(); cx.arc(b.x+b.w-6,b.y+b.h/2,3,0,Math.PI*2); cx.fill();
    cx.strokeStyle='rgba(100,150,150,0.4)'; cx.lineWidth=1.5;
    cx.beginPath(); cx.moveTo(b.x,b.y+b.h*0.3); cx.lineTo(b.x+b.w,b.y+b.h*0.3); cx.stroke();
    cx.beginPath(); cx.moveTo(b.x,b.y+b.h*0.7); cx.lineTo(b.x+b.w,b.y+b.h*0.7); cx.stroke();
  }

  // Cracks
  if(dr>0.3){
    cx.strokeStyle=`rgba(0,0,0,${dr*0.7})`; cx.lineWidth=1.2+dr;
    cx.beginPath();
    cx.moveTo(b.x+b.w*0.3,b.y); cx.lineTo(b.x+b.w*0.45,b.y+b.h*0.4);
    cx.lineTo(b.x+b.w*0.65,b.y+b.h*0.6); cx.lineTo(b.x+b.w*0.58,b.y+b.h);
    cx.stroke();
    if(dr>0.6){
      cx.beginPath();
      cx.moveTo(b.x+b.w*0.7,b.y+b.h*0.1); cx.lineTo(b.x+b.w*0.55,b.y+b.h*0.5); cx.stroke();
    }
  }

  cx.strokeStyle='rgba(0,0,0,0.45)'; cx.lineWidth=1;
  cx.strokeRect(b.x,b.y,b.w,b.h);
  cx.restore();
}

// ─────────────────────────────────────────────
// DRAW: NEC FAN ENEMY  (image)
// ─────────────────────────────────────────────
function drawEnemy(e) {
  if(!e.alive) return;
  const r = e.r;
  const bob = Math.sin(e.anim) * (e.scared ? 3 : 1.5);
  cx.save();
  cx.translate(e.x, e.y + bob);
  if(e.bonk > 0) cx.translate((Math.random()-0.5)*e.bonk*5, (Math.random()-0.5)*e.bonk*3);

  const sc = r / 19;
  const dr = 1 - (e.hp / e.maxHp);
  cx.scale(sc, sc);

  // Shadow
  cx.fillStyle = 'rgba(0,0,0,0.25)';
  cx.beginPath(); cx.ellipse(0, 42, 16, 5, 0, 0, Math.PI*2); cx.fill();

  const iw = 80, ih = 95;
  if(dr > 0.55) {
    cx.globalAlpha = 0.55;
    cx.drawImage(IMG_KID, -iw*0.5, -ih*0.72, iw, ih);
    cx.globalAlpha = 1;
    cx.strokeStyle = '#ff2020'; cx.lineWidth = 3;
    [[-9,-44],[9,-44]].forEach(([ox,oy]) => {
      cx.beginPath(); cx.moveTo(ox-6,oy-6); cx.lineTo(ox+6,oy+6); cx.stroke();
      cx.beginPath(); cx.moveTo(ox+6,oy-6); cx.lineTo(ox-6,oy+6); cx.stroke();
    });
  } else {
    cx.drawImage(IMG_KID, -iw*0.5, -ih*0.72, iw, ih);
  }

  if(e.boss) {
    cx.save(); cx.translate(32, 4); cx.rotate(0.3);
    cx.fillStyle = '#7a3508';
    cx.beginPath(); cx.moveTo(-4,-7); cx.lineTo(18,-12); cx.lineTo(18,12); cx.lineTo(-4,7); cx.closePath();
    cx.fill(); cx.strokeStyle = '#111'; cx.lineWidth = 1.5; cx.stroke();
    cx.fillStyle = '#aaa'; cx.fillRect(-8,-6,8,12);
    cx.strokeStyle = '#111'; cx.lineWidth = 1; cx.strokeRect(-8,-6,8,12);
    cx.restore();
    const bw = 52;
    cx.fillStyle = 'rgba(0,0,0,0.7)'; cx.fillRect(-bw/2,-88,bw,10);
    const hpR = e.hp/e.maxHp;
    cx.fillStyle = hpR>0.5?'#20cc20':hpR>0.25?'#ddcc20':'#dd2020';
    cx.fillRect(-bw/2,-88,bw*hpR,10);
    cx.strokeStyle = 'rgba(255,255,255,0.5)'; cx.lineWidth = 1; cx.strokeRect(-bw/2,-88,bw,10);
    cx.font = 'bold 8px Bangers,sans-serif';
    cx.fillStyle = '#fff'; cx.textAlign = 'center'; cx.textBaseline = 'middle';
    cx.fillText('DE CAPO', 0, -83);
  }
  cx.restore();
}

// ─────────────────────────────────────────────
// DRAW: PROJECTILE
// ─────────────────────────────────────────────
function drawProjectile() {
  if(!proj) return;
  // Trail
  for(let i=0;i<proj.trail.length;i++){
    const t=proj.trail[i];
    const a=(i/proj.trail.length)*0.35;
    cx.globalAlpha=a;
    cx.fillStyle='#FFD700';
    cx.beginPath();
    cx.arc(t.x,t.y,proj.r*(i/proj.trail.length)*0.65,0,Math.PI*2);
    cx.fill();
  }
  cx.globalAlpha=1;
  drawBeerCan(proj.x,proj.y,proj.angle);
}

// ─────────────────────────────────────────────
// DRAW: SLING DRAG
// ─────────────────────────────────────────────
function drawSling() {
  if(!drag) return;
  const {cx:dcx, cy:dcy} = drag;

  // Draw a throw arc line from hand to drag point
  cx.strokeStyle = 'rgba(255,200,80,0.55)';
  cx.lineWidth = 2;
  cx.setLineDash([5, 5]);
  cx.beginPath();
  cx.moveTo(HAND_X, HAND_Y);
  cx.lineTo(dcx, dcy);
  cx.stroke();
  cx.setLineDash([]);

  // Can at drag point
  drawBeerCan(dcx, dcy, Math.atan2(dcy - HAND_Y, dcx - HAND_X));

  // Trajectory preview dots
  const vx0 = (HAND_X - dcx) * 0.14;
  const vy0 = (HAND_Y - dcy) * 0.14 - 0.5;
  let px = HAND_X, py = HAND_Y, pvx = vx0, pvy = vy0;
  for(let i = 0; i < 30; i++) {
    pvy += GRAVITY; px += pvx; py += pvy;
    if(py > GY) break;
    const a = Math.max(0, (0.65 - i * 0.022));
    cx.globalAlpha = a;
    cx.fillStyle = '#FFE050';
    cx.beginPath(); cx.arc(px, py, Math.max(1.2, 4.5 - i * 0.12), 0, Math.PI * 2); cx.fill();
  }
  cx.globalAlpha = 1;

  // Power meter
  const power = Math.hypot(HAND_X - dcx, HAND_Y - dcy) / maxDrag;
  const mw = 64, mh = 9;
  const mx = CAT_X - mw/2, my = GY + 14;
  cx.fillStyle = 'rgba(0,0,0,0.55)'; cx.fillRect(mx, my, mw, mh);
  cx.fillStyle = power > 0.7 ? '#ff3020' : power > 0.4 ? '#ffaa00' : '#30cc20';
  cx.fillRect(mx, my, mw * power, mh);
  cx.strokeStyle = 'rgba(255,255,255,0.4)'; cx.lineWidth = 1;
  cx.strokeRect(mx, my, mw, mh);
  cx.font = 'bold 9px Bangers,sans-serif';
  cx.fillStyle = '#fff'; cx.textAlign = 'center'; cx.textBaseline = 'middle';
  cx.fillText('KRACHT', CAT_X, my + mh/2);
}

// ─────────────────────────────────────────────
// DRAW: PARTICLES
// ─────────────────────────────────────────────
function drawParticles() {
  for(const p of particles){
    cx.globalAlpha=Math.max(0,p.life);
    if(p.isText){
      cx.font=`bold ${13}px Bangers,sans-serif`;
      cx.fillStyle='#FFD700';
      cx.strokeStyle='rgba(0,0,0,0.8)'; cx.lineWidth=2;
      cx.textAlign='center'; cx.textBaseline='middle';
      cx.strokeText(p.text,p.x,p.y);
      cx.fillText(p.text,p.x,p.y);
    } else {
      cx.fillStyle=p.color;
      cx.beginPath(); cx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); cx.fill();
    }
  }
  cx.globalAlpha=1;
  for(const d of debris){
    cx.save(); cx.globalAlpha=d.life;
    cx.translate(d.x,d.y); cx.rotate(d.rot);
    cx.fillStyle=d.color;
    cx.fillRect(-d.w/2,-d.h/2,d.w,d.h);
    cx.restore();
  }
  cx.globalAlpha=1;
}

  [0.15,0.4,0.65,0.9].forEach((px,i)=>{
    const gy=H*(0.1+Math.sin(t+i*1.3)*0.08);
    const g=cx.createRadialGradient(W*px,gy,0,W*px,gy,W*0.18);
    const hue=(i*90+t*60)%360;
    g.addColorStop(0,`hsla(${hue},100%,65%,0.5)`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=g; cx.fillRect(0,0,W,H);
  });

  cx.save(); cx.textAlign='center';
  cx.font=`bold ${H*0.085}px Bangers,sans-serif`;
  cx.fillStyle='#FFE040'; cx.shadowColor='#FFD700'; cx.shadowBlur=30;
  cx.fillText('GODNONDEJU!!',W/2,H*0.18);
  cx.shadowBlur=10;
  cx.font=`bold ${H*0.058}px Bangers,sans-serif`;
  cx.fillStyle='#30ff60';
  cx.fillText('ARNHEM OVERWINT!',W/2,H*0.29);

  cx.shadowBlur=0; cx.font=`bold ${H*0.055}px Bangers,sans-serif`;
  cx.fillStyle='#FFD700';
  cx.fillText(`TOTAALSCORE: ${totalScore}`,W/2,H*0.4);

  cx.font=`${H*0.085}px sans-serif`;
  cx.globalAlpha=1;
  ['📦','📦','📦'].forEach((c,i)=> cx.fillText(c,W/2+(i-1)*W*0.15,H*0.51));
  cx.globalAlpha=1;

  cx.font=`${H*0.03}px Special Elite,serif`;
  cx.fillStyle='rgba(160,200,160,0.7)';
  cx.fillText('Heel Nijmegen platgelegd!',W/2,H*0.575);

  drawBtn(cx,'🏠 TERUG NAAR MENU',W/2,H*0.68,W*0.72,H*0.085,'#8a1c08');
  cx.restore();
}

// ─────────────────────────────────────────────
// MAIN RENDER
// ─────────────────────────────────────────────
function render() {
  cx.clearRect(0,0,W,H);

  if(state===S.MENU){ drawMenu(); return; }

  // Game world
  const lvlDef=LEVELS[currentLevel];
  cx.drawImage(getBgCanvas(lvlDef.bg),0,0);
  drawGround();

  blocks.forEach(b=>drawBlock(b));
  enemies.forEach(e=>drawEnemy(e));
  drawParticles();
  drawCatapult();
  if(drag) drawSling();
  drawProjectile();
  drawHUD();

  if(state===S.PAUSED)    drawPauseScreen();
  if(state===S.LEVEL_WIN) drawLevelWinScreen();
  if(state===S.GAME_OVER) drawGameOverScreen();
  if(state===S.GAME_WIN)  drawGameWinScreen();
}

// ─────────────────────────────────────────────
// GAME LOOP
// ─────────────────────────────────────────────
function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
